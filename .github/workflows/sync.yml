name: Sync Notion to GitHub

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖包
        run: |
          pip install notion-client
          pip install python-frontmatter

      - name: 执行同步脚本
        env:
          NOTION_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DB: ${{ secrets.NOTION_DATABASE_ID }}
        run: python sync.py

      - name: 提交并推送更改
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "📝 自动同步 Notion 文章 [skip ci]"
          git push
